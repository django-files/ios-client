name: "Screenshots"

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  screenshots:
    name: "Screenshots (${{ matrix.device }})"
    runs-on: macos-26
    timeout-minutes: 60
    strategy:
      matrix:
        device:
          - "iPhone 17 Pro Max"
          - "iPhone 17"
          - "iPad Pro 11-inch (M5)"
      fail-fast: false

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Google Services File"
        run: |
          echo "${{ secrets.GOOGLE_SERVICES }}" | base64 --decode > "Django Files/GoogleService-Info.plist"

      - name: "Select Xcode"
        run: sudo xcode-select --switch /Applications/Xcode_26.4.app

      - name: "Capture Screenshots"
        run: fastlane screenshots
        env:
          SNAPSHOT_DEVICE: ${{ matrix.device }}
          SCREENSHOT_SERVER_URL: ${{ secrets.SCREENSHOT_SERVER_URL }}
          SCREENSHOT_USERNAME: ${{ secrets.SCREENSHOT_USERNAME }}
          SCREENSHOT_PASSWORD: ${{ secrets.SCREENSHOT_PASSWORD }}

      - name: "Upload Screenshots"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.device }}
          path: "fastlane/screenshots"

      - name: "Send Failure Notification"
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
