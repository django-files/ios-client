name: "Publish"

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  command: ${{ github.event.release.prerelease && 'beta' || 'push_appstore' }}

jobs:
  # Capture App Store screenshots before the build so they can be uploaded
  # together.  Only runs for full releases — pre-releases (beta) skip this.
  screenshots:
    name: "Screenshots"
    runs-on: macos-26
    timeout-minutes: 90
    if: ${{ !contains(github.event.release.body, '[skip screenshots]') }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Google Services File"
        run: |
          echo "${{ secrets.GOOGLE_SERVICES }}" | base64 --decode > "Django Files/GoogleService-Info.plist"

      - name: "Select Xcode"
        run: sudo xcode-select --switch /Applications/Xcode_26.4.app

      - name: "Capture Screenshots"
        run: fastlane screenshots
        env:
          SCREENSHOT_SERVER_URL: ${{ secrets.SCREENSHOT_SERVER_URL }}
          SCREENSHOT_USERNAME: ${{ secrets.SCREENSHOT_USERNAME }}
          SCREENSHOT_PASSWORD: ${{ secrets.SCREENSHOT_PASSWORD }}

      - name: "Upload Screenshots Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "fastlane/screenshots"

  publish:
    name: "Publish"
    runs-on: macos-26
    timeout-minutes: 30
    # Wait for screenshots on full releases; pre-releases skip the screenshots
    # job so needs.screenshots.result will be 'skipped' — run anyway.
    needs: [screenshots]
    if: ${{ always() && !cancelled() && (needs.screenshots.result == 'success' || needs.screenshots.result == 'skipped') }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Set Run Number"
        id: run
        run: |
          echo "number=$(echo $((50 + ${{ github.run_number }})))" >> "$GITHUB_OUTPUT"

      - name: "Debug Run Number"
        continue-on-error: true
        run: |
          echo "number: ${{ steps.run.outputs.number }}"

      - name: "Add SSH Key"
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: "Google Services File"
        run: |
          echo "${{ secrets.GOOGLE_SERVICES }}" | base64 --decode > "Django Files/GoogleService-Info.plist"

      - name: "Select Xcode"
        run: sudo xcode-select --switch /Applications/Xcode_26.4.app

      # Download the screenshots captured by the screenshots job so
      # upload_to_app_store can include them.  Skipped for pre-releases.
      - name: "Download Screenshots"
        if: ${{ needs.screenshots.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: screenshots
          path: "fastlane/screenshots"

      - name: "Fastlane ${{ env.command }}"
        run: fastlane ${{ env.command }}
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_URL: git@github.com:django-files/ios-match-certs.git
          CI: false
          APPLE_ID: ${{ secrets.APPLE_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
          ASC_API_ID: ${{ secrets.ASC_API_ID }}
          BUILD_NUMBER: ${{ steps.run.outputs.number }}
          VERSION_NUMBER: ${{ github.event.release.tag_name }}

      - name: "Debug Fastlane"
        if: ${{ !github.event.act }}
        continue-on-error: true
        run: |
          ls -lAh .
          ls -lAh fastlane/metadata
          ls -lAh fastlane/screenshots

      - name: "Upload Metadata"
        if: ${{ !github.event.act }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.repository_owner }}-metadata
          path: "fastlane/metadata"

      - name: "Upload Screenshots"
        if: ${{ !github.event.act }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.repository_owner }}-screenshots
          path: "fastlane/screenshots"

      - name: "Upload IPA"
        if: ${{ !github.event.act }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.repository_owner }}-${{ env.command }}
          path: "Django Files.ipa"

      - name: "Upload IPA to Release"
        if: ${{ github.event_name == 'release' }}
        continue-on-error: true
        uses: svenstaro/upload-release-action@v2
        with:
          file: "Django Files.ipa"
          tag: ${{ github.ref }}
          overwrite: true

      - name: "Update Release Notes Action"
        if: ${{ github.event_name == 'release' }}
        continue-on-error: true
        uses: smashedr/update-release-notes-action@master
        with:
          type: generic

      - name: "Send Failure Notification"
        if: ${{ failure() && github.event_name == 'release' }}
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
